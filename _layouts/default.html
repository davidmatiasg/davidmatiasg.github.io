<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    {% seo %}

    <!-- Optional: nice serif + sans pairing -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">
  </head>

  <body>
    <header class="site-header">
      <div class="wrap header-inner">
        <div class="brand">
          <a class="brand-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>

        <nav class="nav">
          <a class="nav-link" href="{{ '/' | relative_url }}">Home</a>
          <a class="nav-link" href="{{ '/' | relative_url }}#about">About</a>
          <a class="nav-link" href="{{ '/' | relative_url }}#research">Research</a>
          <a class="nav-link" href="{{ '/' | relative_url }}#teaching">Teaching</a>
          <a class="nav-link" href="{{ '/energy-markets/' | relative_url }}">Energy Markets</a>
          <a class="nav-link" href="{{ '/' | relative_url }}#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <article class="page {% if page.show_photo %}with-photo{% else %}no-photo{% endif %}">
        {% if page.show_photo %}
          <aside class="home-photo">
            <img
              src="{{ page.photo_path | default: '/assets/img/headshot.jpg' | relative_url }}"
              alt="{{ page.photo_alt | default: site.title }}"
              loading="lazy"
            />
            {% if page.photo_caption %}
              <div class="photo-caption">{{ page.photo_caption }}</div>
            {% endif %}
          </aside>
        {% endif %}

        <div class="content">
          {{ content }}
        </div>
      </article>

      <footer class="site-footer">
        <div class="wrap footer-inner">
          <span>© {{ site.time | date: "%Y" }} {{ site.title }}</span>
        </div>
      </footer>
    </main>
    <script>
      (function () {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
          return;
        }
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
          });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal').forEach(function (el) { io.observe(el); });
      })();
    </script>
  </body>
</html>
